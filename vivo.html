<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC ARENA 1.0 — Transmisión en Vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#060907; --bg-1:#0B120C; --grass:#0E2412; --line:#22301F;
    --green:#39FF88; --gold:#F4C542; --white:#F3F5F8; --dim:#8FA391; --danger:#FF5B6E;
    --font-display:'Orbitron', sans-serif; --font-body:'Rajdhani', sans-serif; --font-mono:'Share Tech Mono', monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    min-height:100vh;
    color:var(--white); font-family:var(--font-body);
    background:
      radial-gradient(circle at 50% -10%, rgba(57,255,136,0.10), transparent 45%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 90px),
      linear-gradient(180deg, var(--bg-0), var(--grass) 55%, var(--bg-0));
    position:relative; overflow-x:hidden;
    padding-bottom:70px;
  }
  /* Líneas de cancha decorativas */
  body::before{
    content:"";
    position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
    background:
      radial-gradient(circle at 50% 100%, transparent 0 90px, rgba(255,255,255,0.04) 90px 92px, transparent 92px),
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px) 0 0 / 100% 50%;
  }
  .wrap{ max-width:1100px; margin:0 auto; padding:30px 22px 40px; position:relative; z-index:1; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:26px; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .ball{
    width:42px; height:42px; border-radius:50%; flex-shrink:0;
    background:
      radial-gradient(circle at 32% 28%, #fff 0 6px, transparent 7px),
      radial-gradient(circle at 68% 28%, transparent 0 5px, #0a0a0a 5px 7px, transparent 8px),
      conic-gradient(from 0deg, #111 0 15deg, #fff 15deg 45deg, #111 45deg 60deg, #fff 60deg 90deg, #111 90deg 105deg, #fff 105deg 135deg, #111 135deg 150deg, #fff 150deg 180deg, #111 180deg 195deg, #fff 195deg 225deg, #111 225deg 240deg, #fff 240deg 270deg, #111 270deg 285deg, #fff 285deg 315deg, #111 315deg 330deg, #fff 330deg 360deg),
      radial-gradient(circle at 35% 30%, #fdfdfd, #ccc 70%, #888);
    box-shadow:0 0 22px rgba(255,255,255,0.15);
    animation:spin 6s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .brand h1{ font-family:var(--font-display); font-size:20px; margin:0; }
  .brand h1 span{ color:var(--green); }
  .brand .tag{ font-family:var(--font-mono); font-size:10.5px; color:var(--gold); letter-spacing:.14em; text-transform:uppercase; }
  .back-btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 18px; border-radius:999px; border:1px solid var(--line);
    color:var(--dim); font-family:var(--font-mono); font-size:12px; letter-spacing:.05em; text-transform:uppercase;
    text-decoration:none; transition:all .2s ease;
  }
  .back-btn:hover{ border-color:var(--green); color:var(--green); }

  .stadium{
    position:relative;
    border:3px solid var(--line);
    border-radius:22px;
    padding:16px;
    background:
      linear-gradient(180deg, rgba(57,255,136,0.06), transparent 30%),
      #030503;
    box-shadow:0 0 0 1px rgba(244,197,66,0.12) inset, 0 24px 60px rgba(0,0,0,0.55);
  }
  .floodlights{ position:absolute; top:-26px; left:0; right:0; display:flex; justify-content:space-between; padding:0 30px; pointer-events:none; }
  .floodlights .light{ width:14px; height:26px; background:linear-gradient(180deg, var(--gold), transparent); border-radius:3px 3px 0 0; opacity:.75; filter:blur(0.3px); }
  .floodlights .light::after{ content:""; display:block; width:26px; height:26px; margin-left:-6px; border-radius:50%;
    background:radial-gradient(circle, rgba(244,197,66,0.55), transparent 70%); }

  .stream-topbar{ display:flex; align-items:center; justify-content:space-between; padding:2px 8px 14px; flex-wrap:wrap; gap:8px; }
  .stream-live{ display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:11px; letter-spacing:.1em;
    color:#fff; background:var(--danger); padding:4px 10px; border-radius:5px; }
  .stream-live::before{ content:""; width:6px; height:6px; border-radius:50%; background:#fff; animation:blink 1.4s infinite; }
  @keyframes blink{ 50%{ opacity:.3; } }
  .stream-channel{ font-family:var(--font-mono); font-size:11.5px; color:var(--gold); }
  .stream-body{ border-radius:12px; overflow:hidden; aspect-ratio:16/9; background:#000; }
  .stream-body iframe{ width:100%; height:100%; border:0; display:block; }

  .kickoff-strip{
    display:flex; justify-content:center; gap:26px; margin-top:22px; flex-wrap:wrap;
    font-family:var(--font-mono); font-size:11px; color:var(--dim); letter-spacing:.08em; text-transform:uppercase;
  }
  .kickoff-strip span{ display:flex; align-items:center; gap:6px; }
  .kickoff-strip .flag{ width:12px; height:9px; background:repeating-conic-gradient(#fff 0 90deg, #111 0 180deg); background-size:6px 6px; border-radius:1px; }

  .banner{
    margin-top:26px; text-align:center; padding:20px; border-radius:16px;
    border:1px dashed var(--line); font-family:var(--font-mono); font-size:12.5px; color:var(--dim);
  }
  .banner b{ color:var(--gold); }

  .site-footer{ position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:center; align-items:center;
    padding:14px 10px; background:linear-gradient(180deg, transparent, rgba(3,5,3,0.92) 35%, #030503);
    border-top:1px solid var(--line); font-family:var(--font-mono); font-size:12px; letter-spacing:.04em; color:var(--dim); z-index:50; }
  .site-footer span{ color:var(--gold); }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="ball"></div>
      <div>
        <h1>FC <span>ARENA</span> 1.0</h1>
        <div class="tag">Pantalla de Transmisión</div>
      </div>
    </div>
    <a href="index.html" class="back-btn">← Volver al panel</a>
  </div>

  <div class="stadium">
    <div class="floodlights">
      <div class="light"></div><div class="light"></div><div class="light"></div><div class="light"></div><div class="light"></div>
    </div>
    <div class="stream-topbar">
      <span class="stream-live">● EN VIVO</span>
      <span class="stream-channel">twitch.tv/kratos07m</span>
    </div>
    <div class="stream-body">
      <iframe id="twitchFrame" src="" allowfullscreen></iframe>
    </div>
  </div>

  <div class="kickoff-strip">
    <span><span class="flag"></span> Fútbol 11</span>
    <span><span class="flag"></span> Fútbol Sala</span>
    <span><span class="flag"></span> FC 26 / FIFA</span>
  </div>

  <div class="banner">Sigue el marcador y las estadísticas en tiempo real desde el <b>Panel Principal de FC Arena</b>.</div>
</div>

<footer class="site-footer">@Derechos Reservados <span>Elkis H. Mora Ch.</span></footer>

<script>
(function initTwitch(){
  const host = location.hostname || 'localhost';
  const frame = document.getElementById('twitchFrame');
  frame.src = `https://player.twitch.tv/?channel=kratos07m&parent=${host}&parent=localhost&muted=false`;
})();
</script>
</body>
</html>
